<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Birthday Gift Card</title>
    <link rel="stylesheet" href="assets/CSS/styles.css">
  </head>
  <body>
    <section class="gift-card">
      <h1>Happy Birthday!</h1>
        <p>Wishing you all the happiness and joy on your special day!</p>
        <div class="buttons">
          <a href="#send-card">Send Card</a>
          <a href="#share-card">Share on social media</a>
        </div>
    </section>
    <section class="give-cards"  id="send-card">
      <h2>Sending your card...</h2>
      <p>card successful sent to your recipient!</p>
    </section>

    <section class="give-cards"  id="share-card">
    <h2> Sharing you card...  </h2>
<p>your card was shared on social media!</p>
    </section>
  </body>
</html>
